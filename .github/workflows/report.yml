# Scheduling seam: run the engine on a monthly cron and commit the report.
# This is an example template, disabled by default. To use it:
#   1. Add your API keys as repository secrets (Settings -> Secrets -> Actions).
#   2. Commit your config/tenant.yaml.
#   3. Uncomment the `schedule` trigger below.
# See docs/EXTENDING.md ("Scheduling").
name: Monthly report

on:
  workflow_dispatch:
  # schedule:
  #   - cron: "0 6 1 * *"   # 06:00 UTC on the 1st of each month

jobs:
  report:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
      - name: Set up Python
        run: uv python install 3.11
      - name: Install
        run: uv sync
      - name: Run report
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
          APIFY_TOKEN: ${{ secrets.APIFY_TOKEN }}
        run: uv run gtm run --config config/tenant.yaml
      # - name: Commit the rendered report
      #   run: |
      #     git config user.name "github-actions"
      #     git config user.email "github-actions@users.noreply.github.com"
      #     git add output/ && git commit -m "chore: monthly report" && git push
